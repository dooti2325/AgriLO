services:
  - type: web
    name: agri-lo-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        sync: false # Set this in the Render dashboard or use your Supabase URL
      - key: SUPABASE_URL
        value: "https://alhkicmctseciieizaxw.supabase.co"
      - key: SUPABASE_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: DEBUG
        value: "False"
    rootDir: server # Points Render to the server subdirectory
